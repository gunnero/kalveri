name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:a11y
      - run: npm audit --audit-level=high

  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ruby -e 'require "yaml"; Dir[".github/**/*.{yml,yaml}"].each { |file| YAML.load_file(file) }'
      - run: python3 -c 'import xml.etree.ElementTree as ET; ET.parse("docs/assets/architecture.svg"); ET.parse("sitemap.xml")'
      - run: git diff --check
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --offline './**/*.md'
          fail: true

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
