name: Website bug
description: Report a reproducible problem on the public Kalveri website.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, personal data, private infrastructure, or security vulnerabilities. Follow SECURITY.md for private disclosure.
  - type: input
    id: page
    attributes:
      label: Public page or section
      placeholder: Homepage, Products section, mobile navigation
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: Explain what happened and what you expected.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and viewport
      placeholder: Firefox 128, 1440 x 900
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: This report contains no secrets, personal data, private infrastructure, or vulnerability details.
          required: true
