<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Kalveri static website architecture</title>
  <desc id="desc">A public visitor receives static website content, assets, and metadata. Validation produces a reviewed artifact for a generic release process.</desc>
  <rect width="1200" height="420" rx="24" fill="#05070b"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g fill="#111722" stroke="#d6aa56" stroke-width="2">
      <rect x="50" y="75" width="180" height="70" rx="12"/>
      <rect x="300" y="75" width="210" height="70" rx="12"/>
      <rect x="580" y="30" width="210" height="60" rx="12"/>
      <rect x="580" y="105" width="210" height="60" rx="12"/>
      <rect x="580" y="180" width="210" height="60" rx="12"/>
      <rect x="50" y="295" width="180" height="70" rx="12"/>
      <rect x="300" y="295" width="210" height="70" rx="12"/>
      <rect x="580" y="295" width="210" height="70" rx="12"/>
      <rect x="860" y="295" width="270" height="70" rx="12"/>
    </g>
    <g fill="#f4f1ea" font-size="18">
      <text x="140" y="118">Public visitor</text>
      <text x="405" y="108">Static HTML and CSS</text>
      <text x="685" y="68">Public product content</text>
      <text x="685" y="143">Brand assets</text>
      <text x="685" y="218">SEO metadata</text>
      <text x="140" y="338">Node validation</text>
      <text x="405" y="328">Lint, tests, build</text>
      <text x="685" y="328">Accessibility and</text>
      <text x="685" y="350">link checks</text>
      <text x="995" y="328">Reviewed static artifact</text>
      <text x="995" y="350">and generic release</text>
    </g>
  </g>
  <g stroke="#d6aa56" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#d6aa56"/></marker></defs>
    <path d="M230 110H300"/>
    <path d="M510 110C545 110 545 60 580 60"/>
    <path d="M510 110H580"/>
    <path d="M510 110C545 110 545 210 580 210"/>
    <path d="M230 330H300"/>
    <path d="M510 330H580"/>
    <path d="M790 330H860"/>
  </g>
</svg>
